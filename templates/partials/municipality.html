<div id="mun-wrap" class="filter-cell">
  <label for="f-mun">Municipality</label>
  <select id="f-mun" name="municipality"
          hx-get="/partials/zone"
          hx-target="#zone-wrap"
          hx-swap="outerHTML"
          hx-include="[name='region'], [name='province'], [name='municipality']"
          hx-trigger="{% if cascade %}load, {% endif %}change"
          {% if disabled %}disabled{% endif %}>
    <option value="" selected>Average (all municipalities)</option>
    {% for v in values %}
    <option value="{{ v }}">{{ v }}</option>
    {% endfor %}
  </select>
</div>
