<div id="province-wrap" class="filter-cell">
  <label for="f-province">Province</label>
  <select id="f-province" name="province"
          hx-get="/partials/municipality"
          hx-target="#mun-wrap"
          hx-swap="outerHTML"
          hx-include="[name='region'], [name='province']"
          hx-trigger="{% if cascade %}load, {% endif %}change"
          {% if disabled %}disabled{% endif %}>
    <option value="" selected>Average (all provinces)</option>
    {% for v in values %}
    <option value="{{ v }}">{{ v }}</option>
    {% endfor %}
  </select>
</div>
