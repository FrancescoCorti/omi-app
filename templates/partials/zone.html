<div id="zone-wrap" class="filter-cell">
  <label for="f-zone">Zone</label>
  <select id="f-zone" name="zone"
          hx-get="/partials/condition"
          hx-target="#condition-wrap"
          hx-swap="outerHTML"
          hx-include="[name='region'], [name='province'], [name='municipality'], [name='zone']"
          hx-trigger="{% if cascade %}load, {% endif %}change"
          {% if disabled %}disabled{% endif %}>
    <option value="" selected>Average (all zones)</option>
    {% for v in values %}
    <option value="{{ v }}">{{ v }}</option>
    {% endfor %}
  </select>
</div>
