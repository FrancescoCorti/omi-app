{% extends "base.html" %}

{% block title %}Estate Insights — Chart{% endblock %}

{% block content %}
<div class="chart-page" id="chart-page">
  <form id="filter-form" onsubmit="return false;">
    <div class="filter-row">
      <div class="filter-cell">
        <label for="f-region">Region</label>
        <select id="f-region" name="region">
          <option value="" selected>Average (all regions)</option>
          {% for r in regions %}
          <option value="{{ r }}">{{ r }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="filter-cell">
        <label for="f-province">Province</label>
        <select id="f-province" name="province" disabled>
          <option value="" selected>Average (all provinces)</option>
        </select>
      </div>

      <div class="filter-cell">
        <label for="f-mun">Municipality</label>
        <select id="f-mun" name="municipality" disabled>
          <option value="" selected>Average (all municipalities)</option>
        </select>
      </div>

      <div class="filter-cell">
        <label for="f-zone">Zone <span style="font-size:0.75rem;opacity:0.6;">(from 2014)</span></label>
        <select id="f-zone" name="zone" disabled>
          <option value="" selected>Average (all zones)</option>
        </select>
      </div>
    </div>

    <div class="filter-row">
      <div class="filter-cell">
        <label for="f-type">Property type</label>
        <select id="f-type" name="type">
          {% for t in types %}
          <option value="{{ t }}" {% if t == default_type %}selected{% endif %}>{{ t }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="filter-cell">
        <label for="f-condition">Condition</label>
        <select id="f-condition" name="condition">
          <option value="" selected>Average (all conditions)</option>
        </select>
      </div>

      <div class="filter-cell filter-cell--period">
        <label>Time range</label>
        <div class="period-toggle">
          <button class="period-btn" data-period="5y">5Y</button>
          <button class="period-btn" data-period="10y">10Y</button>
          <button class="period-btn period-btn--active" data-period="max">MAX</button>
        </div>
      </div>

      <div class="filter-cell filter-cell--period">
        <label>Transactions <span style="font-size:0.75rem;opacity:0.6;">(aggregated residential - from 2014)</span></label>
        <div class="period-toggle" id="ntn-size-toggle">
          <button type="button" class="period-btn" data-size="total">Total</button>
          <button type="button" class="period-btn" data-size="le50">&le;50m&sup2;</button>
          <button type="button" class="period-btn" data-size="r50_85">50&ndash;85</button>
          <button type="button" class="period-btn" data-size="r85_115">85&ndash;115</button>
          <button type="button" class="period-btn" data-size="r115_145">115&ndash;145</button>
          <button type="button" class="period-btn" data-size="gt145">&gt;145m&sup2;</button>
        </div>
      </div>
    </div>
  </form>

  <div id="chart"></div>

  <div class="yoy-panel">
    <div class="yoy-header">
      <span class="yoy-title">% Change <span style="font-size:0.73rem;font-weight: 600;letter-spacing: 0.07em;color:#5a6478;opacity:0.6;">(MEAN PRICE - FROM 2015)</span></span>
      <div style="display:flex;flex-direction:row;align-items:center;gap:10px;">
        <span style="font-size:0.73rem;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--text-muted);">Change period</span>
        <div class="period-toggle" id="yoy-mode-toggle">
          <button class="period-btn period-btn--active" data-mode="semester">Semester</button>
          <button class="period-btn" data-mode="12m">12-Month</button>
        </div>
      </div>
    </div>
    <div id="yoy-chart"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
  const COLOR_MIN  = "steelblue";
  const COLOR_MEAN = "gray";
  const COLOR_MAX  = "tomato";

  const NTN_COLOR = "#7da7d9";
  const RESIDENTIAL_TYPES = new Set([
    "Residential housing", "Lowcost housing",
    "Independent houses and villas", "Luxury housing",
  ]);
  const SIZE_LABEL = {
    total:    "Transactions (total)",
    le50:     "Transactions (≤50m²)",
    r50_85:   "Transactions (50–85m²)",
    r85_115:  "Transactions (85–115m²)",
    r115_145: "Transactions (115–145m²)",
    gt145:    "Transactions (>145m²)",
  };

  function getThemeColors() {
    const light = document.documentElement.getAttribute('data-theme') === 'light';
    return {
      paper: light ? '#f0ece4' : '#030e38',
      text:  light ? '#1a2035' : '#d4dbf0',
      grid:  light ? 'rgba(26,32,53,0.06)'   : 'rgba(255,255,255,0.06)',
      axis:  light ? 'rgba(26,32,53,0.18)'   : 'rgba(255,255,255,0.15)',
      ttBg:  light ? 'rgba(255,255,255,0.97)' : 'rgba(12,26,50,0.95)',
      ttBd:  light ? 'rgba(26,32,53,0.12)'   : 'rgba(255,255,255,0.1)',
    };
  }

  const chartEl = document.getElementById("chart");
  const chart = echarts.init(chartEl, null, { renderer: "canvas" });

  const yoyChart = echarts.init(document.getElementById("yoy-chart"), null, { renderer: "canvas" });

  let yoyMode = "semester";
  function redrawYoy() {
    if (!lastChartData) return;
    const s = semesterChange(lastChartData, "mean", yoyMode);
    yoyChart.setOption(buildYoyOption(s.x, s.values, "mean", yoyMode), true);
  }

  // Hover sync. Both charts share the same x-axis (the semester chart blanks
  // pre-2014 semesters rather than clipping them), so we match by the
  // "YYYY - Sx" label and mirror showTip/hideTip onto the other chart.
  function mainX() {
    if (!lastChartData || lastChartData.empty) return [];
    const d = sliceData(lastChartData);
    return (d && d.x) || [];
  }
  function attachHoverSync(src, srcX, tgt, tgtX) {
    const zr = src.getZr();
    zr.on("mousemove", (ev) => {
      if (!src.containPixel("grid", [ev.offsetX, ev.offsetY])) {
        tgt.dispatchAction({ type: "hideTip" });
        return;
      }
      const i = Math.round(src.convertFromPixel({ xAxisIndex: 0 }, ev.offsetX));
      const cat = srcX()[i];
      const j = cat == null ? -1 : tgtX().indexOf(cat);
      if (j >= 0) tgt.dispatchAction({ type: "showTip", seriesIndex: 0, dataIndex: j });
      else tgt.dispatchAction({ type: "hideTip" });
    });
    zr.on("globalout", () => tgt.dispatchAction({ type: "hideTip" }));
  }
  attachHoverSync(chart, mainX, yoyChart, mainX);
  attachHoverSync(yoyChart, mainX, chart, mainX);

  const DOWNSTREAM = {
    region:       ["province", "municipality", "zone"],
    province:     ["municipality", "zone"],
    municipality: ["zone"],
    zone:         [],
  };

  const LABELS = {
    province:     "Average (all provinces)",
    municipality: "Average (all municipalities)",
    zone:         "Average (all zones)",
    condition:    "Average (all conditions)",
  };

  function readFilters() {
    const get = (name) => {
      const el = document.querySelector(`select[name="${name}"]`);
      return el ? el.value : "";
    };
    return {
      region:       get("region"),
      province:     get("province"),
      municipality: get("municipality"),
      zone:         get("zone"),
      type:         get("type"),
      condition:    get("condition"),
    };
  }

  function clearDownstream(name) {
    for (const child of DOWNSTREAM[name] || []) {
      const el = document.querySelector(`select[name="${child}"]`);
      if (el) el.value = "";
    }
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function paintSelect(name, values, currentValue) {
    const el = document.querySelector(`select[name="${name}"]`);
    if (!el) return;
    const keep = currentValue && values.includes(currentValue) ? currentValue : "";
    let html = `<option value="">${LABELS[name] || "Average"}</option>`;
    for (const v of values) {
      const safe = escapeHtml(v);
      html += `<option value="${safe}"${v === keep ? " selected" : ""}>${safe}</option>`;
    }
    el.innerHTML = html;
    el.value = keep;
    el.disabled = values.length === 0;
  }

  function buildOption(data, ntn, sizeKey) {
    const tc = getThemeColors();
    const font = "Outfit, sans-serif";
    if (data.empty) {
      return {
        backgroundColor: tc.paper,
        title: {
          text: "No data for current selection",
          left: "center",
          top: "middle",
          textStyle: { color: tc.text, fontFamily: font, fontSize: 16, fontWeight: 400 },
        },
      };
    }
    const opt = {
      backgroundColor: tc.paper,
      textStyle: { color: tc.text, fontFamily: font },
      title: {
        text: "Buy Price Trends",
        subtext: data.subtitle,
        left: 0,
        textStyle: { color: tc.text, fontFamily: font, fontWeight: 600 },
        subtextStyle: { color: tc.text, fontFamily: font, opacity: 0.6 },
      },
      grid: { left: 64, right: 24, top: 96, bottom: 50 },
      tooltip: {
        trigger: "axis",
        axisPointer: { type: "line", lineStyle: { color: "#888", type: "dashed", width: 1 } },
        backgroundColor: tc.ttBg,
        borderColor: tc.ttBd,
        textStyle: { color: tc.text, fontFamily: font },
        valueFormatter: (v) => (v == null ? "—" : "€" + Number(v).toLocaleString(undefined, { maximumFractionDigits: 0 }) + "/m²"),
      },
      legend: {
        data: ["Max. price", "Mean price", "Min. price"],
        right: 0, top: 0,
        textStyle: { color: tc.text, fontFamily: font },
        icon: "roundRect",
      },
      xAxis: {
        type: "category",
        data: data.x,
        nameLocation: "middle",
        nameGap: 50,
        nameTextStyle: { color: tc.text, fontFamily: font },
        axisLabel: {
          color: tc.text, fontFamily: font, rotate: 0,
          formatter: (val) => val.endsWith("S1") ? val.split(" - ")[0] : "",
        },
        axisLine: { lineStyle: { color: tc.axis } },
      },
      yAxis: {
        type: "value",
        name: "Price (€/m²)",
        nameTextStyle: { color: tc.text, fontFamily: font },
        axisLabel: { color: tc.text, fontFamily: font },
        axisLine: { lineStyle: { color: tc.axis } },
        splitLine: { lineStyle: { color: tc.grid } },
      },
      series: [
        { name: "Max. price",  type: "line", showSymbol: false, lineStyle: { color: COLOR_MAX,  width: 2 }, itemStyle: { color: COLOR_MAX  }, data: data.max },
        { name: "Mean price", type: "line", showSymbol: false, lineStyle: { color: COLOR_MEAN, width: 2, type: "dashed" }, itemStyle: { color: COLOR_MEAN }, data: data.mean },
        { name: "Min. price", type: "line", showSymbol: false, lineStyle: { color: COLOR_MIN,  width: 2 }, itemStyle: { color: COLOR_MIN  }, data: data.min },
      ],
    };

    if (ntn && !ntn.empty) {
      const key = sizeKey || "total";
      const label = SIZE_LABEL[key] || "Transactions";
      const vals = (ntn.series && ntn.series[key]) || [];
      const byYear = {};
      (ntn.years || []).forEach((y, i) => { byYear[y] = vals[i]; });

      // Two items per year: one at the "S1" tick and one at "S2", both
      // carrying the same count so the axis tooltip shows transactions on
      // either semester. value = [categoryIndex, count, drawFlag]; only the
      // S1 item has drawFlag=1 and renders the (single) centred rect.
      const lastIdx = data.x.length - 1;
      const items = [];
      data.x.forEach((lbl, idx) => {
        const isS1 = lbl.endsWith("S1");
        if (!isS1 && !lbl.endsWith("S2")) return;
        const v = byYear[lbl.split(" - ")[0]];
        if (v == null) return;
        items.push({ value: [idx, v, isS1 ? 1 : 0] });
      });

      opt.yAxis = [
        opt.yAxis,
        {
          type: "value",
          position: "right",
          name: "Transactions",
          nameTextStyle: { color: tc.text, fontFamily: font },
          axisLabel: {
            color: tc.text, fontFamily: font,
            formatter: (v) => Number(v).toLocaleString(),
          },
          axisLine: { lineStyle: { color: tc.axis } },
          splitLine: { show: false },
        },
      ];
      opt.grid = { ...opt.grid, right: 72 };
      opt.legend = { ...opt.legend, data: [...opt.legend.data, label] };
      opt.series = [
        {
          name: label,
          type: "custom",
          xAxisIndex: 0,
          yAxisIndex: 1,
          z: 1,
          clip: true,
          itemStyle: { color: NTN_COLOR, opacity: 0.32 },
          encode: { x: 0, y: 1, tooltip: [1] },
          renderItem: (params, api) => {
            if (api.value(2) !== 1) return;                 // S2 placeholder → tooltip only
            const i1 = api.value(0);
            const cnt = api.value(1);
            const pS1 = api.coord([i1, 0]);                 // S1 tick, baseline
            const adj = i1 + 1 <= lastIdx ? i1 + 1 : i1 - 1; // neighbouring tick
            const band = Math.abs(api.coord([adj, 0])[0] - pS1[0]) || 24;
            const cx = pS1[0] + band / 2;                    // midpoint S1↔S2
            const w = band * 1.6;                            // gap kept between years
            const yTop = api.coord([i1, cnt])[1];
            const rect = {
              x: cx - w / 2, y: yTop,
              width: w, height: pS1[1] - yTop,
            };
            return {
              type: "rect",
              shape: echarts.graphic.clipRectByRect(rect, {
                x: params.coordSys.x, y: params.coordSys.y,
                width: params.coordSys.width, height: params.coordSys.height,
              }),
              style: api.style(),
            };
          },
          data: items,
        },
        ...opt.series,
      ];
      // Per-series formatting: price series stay €/m². The NTN custom series
      // value is [idx, count, drawFlag], so its count is element 1.
      delete opt.tooltip.valueFormatter;
      opt.tooltip.formatter = (params) => {
        const head = params.length ? params[0].axisValue : "";
        let html = `<div style="font-weight:600;margin-bottom:4px">${head}</div>`;
        for (const p of params) {
          let val = p.value;
          if (Array.isArray(val)) val = val[1];
          if (val == null) continue;
          const v = /price$/.test(p.seriesName)
            ? "€" + Number(val).toLocaleString(undefined, { maximumFractionDigits: 0 }) + "/m²"
            : Number(val).toLocaleString();
          html += `${p.marker}${p.seriesName}: <b>${v}</b><br/>`;
        }
        return html;
      };
    }

    return opt;
  }

  // % change vs. the immediately preceding semester (1 index back).
  function computeYoy(values) {
    const out = [];
    for (let i = 0; i < values.length; i++) {
      const prev = values[i - 1];
      if (i < 1 || prev == null || values[i] == null || prev === 0) {
        out.push(null);
      } else {
        out.push(Math.round(((values[i] - prev) / prev) * 1000) / 10);
      }
    }
    return out;
  }

  // % change vs. the same semester one year earlier (2 indices back).
  function compute12m(values) {
    const out = [];
    for (let i = 0; i < values.length; i++) {
      const prev = values[i - 2];
      if (i < 2 || prev == null || values[i] == null || prev === 0) {
        out.push(null);
      } else {
        out.push(Math.round(((values[i] - prev) / prev) * 1000) / 10);
      }
    }
    return out;
  }

  const YOY_POS = "#5bb8a0";
  const YOY_NEG = "#e05050";
  const YOY_LABEL = { min: "Min. price", mean: "Mean price", max: "Max. price" };

  function buildYoyOption(xData, values, activeSeries, mode) {
    const tc = getThemeColors();
    const font = "Outfit, sans-serif";
    if (!xData || xData.length < 2) {
      const modeLabel = mode === "12m" ? "12-month" : "semester";
      return {
        backgroundColor: tc.paper,
        title: {
          text: `Not enough data for ${modeLabel} change`,
          left: "center",
          top: "middle",
          textStyle: { color: tc.text, fontFamily: font, fontSize: 14, fontWeight: 400 },
        },
      };
    }
    const label = YOY_LABEL[activeSeries] || "Mean price";
    return {
      backgroundColor: tc.paper,
      textStyle: { color: tc.text, fontFamily: font },
      grid: { left: 64, right: ntnForRender() ? 72 : 24, top: 48, bottom: 44 },
      tooltip: {
        trigger: "axis",
        axisPointer: { type: "line", lineStyle: { color: "#888", type: "dashed", width: 1 } },
        backgroundColor: tc.ttBg,
        borderColor: tc.ttBd,
        textStyle: { color: tc.text, fontFamily: font },
        valueFormatter: (v) => (v == null ? "—" : (v >= 0 ? "+" : "") + Number(v).toFixed(1) + " %"),
      },
      xAxis: {
        type: "category",
        data: xData,
        axisLabel: {
          color: tc.text, fontFamily: font, rotate: 0,
          formatter: (val) => val.endsWith("S1") ? val.split(" - ")[0] : "",
        },
        axisLine: { lineStyle: { color: tc.axis } },
      },
      yAxis: {
        type: "value",
        name: "%",
        nameTextStyle: { color: tc.text, fontFamily: font },
        axisLabel: { color: tc.text, fontFamily: font },
        axisLine: { lineStyle: { color: tc.axis } },
        splitLine: { lineStyle: { color: tc.grid } },
      },
      series: [
        {
          name: label + " change",
          type: "bar",
          data: values,
          itemStyle: {
            color: (p) => (p.value == null ? "transparent" : (p.value >= 0 ? YOY_POS : YOY_NEG)),
          },
          markLine: {
            symbol: "none",
            silent: true,
            lineStyle: { color: tc.axis, type: "dashed", width: 1 },
            label: { show: false },
            data: [{ yAxis: 0 }],
          },
        },
      ],
    };
  }

  const YEAR_MARKS = [
    { x: "2014 - S1", label: "OMI methodological change (2014)", side: "right" },
    { x: "2024 - S1", label: "OMI methodological change (2024)", side: "left" },
  ];

  function drawYearMarkers(xData) {
    chartEl.querySelectorAll(".omi-marker").forEach(el => el.remove());
    if (!xData || !xData.length) return;
    chartEl.style.position = "relative";
    const tc = getThemeColors();
    const h = chartEl.clientHeight;
    const gridTop = 96, gridBottom = h-50;
    for (const { x, label, side } of YEAR_MARKS) {
      const idx = xData.indexOf(x);
      if (idx < 0) continue;
      const px = chart.convertToPixel({ xAxisIndex: 0 }, idx);

      const wrap = document.createElement("div");
      wrap.className = "omi-marker";
      wrap.style.cssText = `position:absolute;left:${px - 5}px;top:${gridTop}px;width:11px;height:${gridBottom - gridTop}px;z-index:5;cursor:default;`;

      const line = document.createElement("div");
      line.style.cssText = `position:absolute;left:5px;top:0;width:0;height:100%;border-left:1.5px dashed rgba(255,190,60,0.72);pointer-events:none;`;

      const tip = document.createElement("div");
      const tipSide = side === "left" ? "right:12px;" : "left:12px;";
      tip.style.cssText = `display:none;position:absolute;top:4px;${tipSide}padding:5px 9px;font-size:11px;font-family:Outfit,sans-serif;white-space:nowrap;border-radius:3px;border:1px solid rgba(255,190,60,0.55);pointer-events:none;background:${tc.ttBg};color:${tc.text};`;
      tip.textContent = label;

      wrap.addEventListener("mouseenter", () => { tip.style.display = "block"; });
      wrap.addEventListener("mouseleave", () => { tip.style.display = "none"; });
      wrap.appendChild(line);
      wrap.appendChild(tip);
      chartEl.appendChild(wrap);
    }
  }

  // Sequence number prevents an older in-flight response from overwriting a newer one.
  let seq = 0;
  let lastChartData = null;
  let currentPeriod = "max";

  // NTN transaction overlay state.
  let ntnActive = false;
  let lastNtnData = null;
  let currentSizeKey = "total";
  let ntnSeq = 0;

  function ntnForRender() {
    return (ntnActive && lastNtnData && !lastNtnData.empty) ? lastNtnData : null;
  }

  function renderMain() {
    if (!lastChartData) return;
    chart.setOption(
      buildOption(sliceData(lastChartData), ntnForRender(), currentSizeKey), true);
    redrawYoy();
  }

  // Disable size buttons for non-residential types or when a zone is selected.
  // If conditions break while the overlay is on, turn it off silently.
  function syncNtnState() {
    const f = readFilters();
    const allowed = !f.zone && RESIDENTIAL_TYPES.has(f.type);
    const btns = document.querySelectorAll("#ntn-size-toggle .period-btn");
    btns.forEach(b => {
      b.disabled = !allowed;
      b.classList.toggle("period-btn--disabled", !allowed);
    });
    if (!allowed && ntnActive) {
      ntnActive = false;
      btns.forEach(b => b.classList.remove("period-btn--active"));
      renderMain();
    }
  }

  async function updateNtn() {
    const my = ++ntnSeq;
    const f = readFilters();
    const qs = new URLSearchParams({
      region:       f.region,
      province:     f.province,
      municipality: f.municipality,
    }).toString();
    let res;
    try {
      res = await fetch(`/api/ntn?${qs}`);
    } catch (err) {
      console.error("ntn fetch failed", err);
      return;
    }
    if (my !== ntnSeq) return;
    if (!res.ok) {
      console.error("ntn fetch failed", res.status);
      return;
    }
    const d = await res.json();
    if (my !== ntnSeq) return;
    lastNtnData = d;
    renderMain();
  }

  function sliceData(chartData) {
    if (currentPeriod === "max" || !chartData || chartData.empty) return chartData;
    const keep = currentPeriod === "5y" ? 10 : 20;
    const s = Math.max(0, chartData.x.length - keep);
    return {
      ...chartData,
      x:    chartData.x.slice(s),
      min:  chartData.min.slice(s),
      mean: chartData.mean.slice(s),
      max:  chartData.max.slice(s),
    };
  }

  // Semester-change series aligned 1:1 with the main chart's x-axis (same
  // period window) so the two charts line up semester-for-semester. The %
  // change is computed on the full series — so even the leftmost displayed
  // bar is valid — then every semester before 2014 - S2 is blanked, leaving
  // 2014 - S2 (and earlier) empty and data from 2015 - S1 onward.
  function semesterChange(full, activeSeries, mode) {
    if (!full || full.empty || !full.x) return { x: [], values: [] };
    const x = sliceData(full).x || [];
    const start = full.x.length - x.length;
    const computeFn = mode === "12m" ? compute12m : computeYoy;
    const change = computeFn(full[activeSeries] || []).slice(start);
    let cut = full.x.indexOf("2015 - S1");
    if (cut < 0) cut = 0;
    for (let k = 0; k < change.length; k++) {
      if (start + k < cut) change[k] = null;
    }
    return { x, values: change };
  }

  chart.on("finished", () => {
    if (lastChartData && !lastChartData.empty) drawYearMarkers(sliceData(lastChartData).x);
  });

  // Re-render chart colours when theme toggles (no API re-fetch needed).
  new MutationObserver(function () {
    renderMain();
  }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

  async function updateState() {
    const my = ++seq;
    const filters = readFilters();
    const qs = new URLSearchParams(filters).toString();
    let res;
    try {
      res = await fetch(`/api/state?${qs}`);
    } catch (err) {
      console.error("state fetch failed", err);
      return;
    }
    if (my !== seq) return;
    if (!res.ok) {
      console.error("state fetch failed", res.status);
      return;
    }
    const data = await res.json();
    if (my !== seq) return;

    paintSelect("province",     data.options.provinces,      filters.province);
    paintSelect("municipality", data.options.municipalities, filters.municipality);
    paintSelect("zone",         data.options.zones,          filters.zone);
    paintSelect("condition",    data.options.conditions,     filters.condition);

    lastChartData = data.chart;
    renderMain();
    syncNtnState();
    if (ntnActive) updateNtn();
  }

  document.getElementById("chart-page").addEventListener("change", (e) => {
    const t = e.target;
    if (t && t.tagName === "SELECT" && t.name) {
      clearDownstream(t.name);
      updateState();
    }
  });

  document.getElementById("filter-form").addEventListener("click", (e) => {
    const btn = e.target.closest(".period-btn");
    if (!btn || !btn.dataset.period) return;
    btn.closest(".period-toggle").querySelectorAll(".period-btn")
      .forEach(b => b.classList.remove("period-btn--active"));
    btn.classList.add("period-btn--active");
    currentPeriod = btn.dataset.period;
    renderMain();
  });

  document.getElementById("ntn-size-toggle").addEventListener("click", (e) => {
    const btn = e.target.closest(".period-btn");
    if (!btn || btn.disabled) return;
    const size = btn.dataset.size;
    const wasActive = ntnActive && currentSizeKey === size;
    e.currentTarget.querySelectorAll(".period-btn")
      .forEach(b => b.classList.remove("period-btn--active"));
    if (wasActive) {
      // same button clicked again → hide overlay
      ntnActive = false;
      renderMain();
    } else {
      // new button → show overlay with selected size
      btn.classList.add("period-btn--active");
      currentSizeKey = size;
      const wasAlreadyActive = ntnActive;
      ntnActive = true;
      if (!wasAlreadyActive) updateNtn(); // fresh fetch on first activation
      else renderMain();                  // size-only switch, data is still fresh
    }
  });

  document.getElementById("yoy-mode-toggle").addEventListener("click", (e) => {
    const btn = e.target.closest(".period-btn");
    if (!btn) return;
    e.currentTarget.querySelectorAll(".period-btn")
      .forEach(b => b.classList.remove("period-btn--active"));
    btn.classList.add("period-btn--active");
    yoyMode = btn.dataset.mode;
    redrawYoy();
  });

  window.addEventListener("resize", () => { chart.resize(); yoyChart.resize(); });

  updateState();
})();
</script>
{% endblock %}
