{% extends "base.html" %}

{% block title %}Estate Insights — Chart{% endblock %}

{% block content %}
<div class="chart-page" id="chart-page">
  <form id="filter-form" onsubmit="return false;">
    <div class="filter-row">
      <div class="filter-cell">
        <label for="f-region">Region</label>
        <select id="f-region" name="region">
          <option value="" selected>Average (all regions)</option>
          {% for r in regions %}
          <option value="{{ r }}">{{ r }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="filter-cell">
        <label for="f-province">Province</label>
        <select id="f-province" name="province" disabled>
          <option value="" selected>Average (all provinces)</option>
        </select>
      </div>

      <div class="filter-cell">
        <label for="f-mun">Municipality</label>
        <select id="f-mun" name="municipality" disabled>
          <option value="" selected>Average (all municipalities)</option>
        </select>
      </div>

      <div class="filter-cell">
        <label for="f-zone">Zone <span style="font-size:0.75rem;opacity:0.6;">(only after 2014)</span></label>
        <select id="f-zone" name="zone" disabled>
          <option value="" selected>Average (all zones)</option>
        </select>
      </div>
    </div>

    <div class="filter-row">
      <div class="filter-cell">
        <label for="f-type">Property type</label>
        <select id="f-type" name="type">
          {% for t in types %}
          <option value="{{ t }}" {% if t == default_type %}selected{% endif %}>{{ t }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="filter-cell">
        <label for="f-condition">Condition</label>
        <select id="f-condition" name="condition">
          <option value="" selected>Average (all conditions)</option>
        </select>
      </div>

      <div class="filter-cell filter-cell--period">
        <label>Time range</label>
        <div class="period-toggle">
          <button class="period-btn" data-period="5y">5Y</button>
          <button class="period-btn" data-period="10y">10Y</button>
          <button class="period-btn period-btn--active" data-period="max">MAX</button>
        </div>
      </div>
    </div>
  </form>

  <div id="chart"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
  const COLOR_MIN  = "steelblue";
  const COLOR_MEAN = "gray";
  const COLOR_MAX  = "tomato";

  function getThemeColors() {
    const light = document.documentElement.getAttribute('data-theme') === 'light';
    return {
      paper: light ? '#f0ece4' : '#030e38',
      text:  light ? '#1a2035' : '#d4dbf0',
      grid:  light ? 'rgba(26,32,53,0.06)'   : 'rgba(255,255,255,0.06)',
      axis:  light ? 'rgba(26,32,53,0.18)'   : 'rgba(255,255,255,0.15)',
      ttBg:  light ? 'rgba(255,255,255,0.97)' : 'rgba(12,26,50,0.95)',
      ttBd:  light ? 'rgba(26,32,53,0.12)'   : 'rgba(255,255,255,0.1)',
    };
  }

  const chartEl = document.getElementById("chart");
  const chart = echarts.init(chartEl, null, { renderer: "canvas" });

  const DOWNSTREAM = {
    region:       ["province", "municipality", "zone"],
    province:     ["municipality", "zone"],
    municipality: ["zone"],
    zone:         [],
  };

  const LABELS = {
    province:     "Average (all provinces)",
    municipality: "Average (all municipalities)",
    zone:         "Average (all zones)",
    condition:    "Average (all conditions)",
  };

  function readFilters() {
    const get = (name) => {
      const el = document.querySelector(`select[name="${name}"]`);
      return el ? el.value : "";
    };
    return {
      region:       get("region"),
      province:     get("province"),
      municipality: get("municipality"),
      zone:         get("zone"),
      type:         get("type"),
      condition:    get("condition"),
    };
  }

  function clearDownstream(name) {
    for (const child of DOWNSTREAM[name] || []) {
      const el = document.querySelector(`select[name="${child}"]`);
      if (el) el.value = "";
    }
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function paintSelect(name, values, currentValue) {
    const el = document.querySelector(`select[name="${name}"]`);
    if (!el) return;
    const keep = currentValue && values.includes(currentValue) ? currentValue : "";
    let html = `<option value="">${LABELS[name] || "Average"}</option>`;
    for (const v of values) {
      const safe = escapeHtml(v);
      html += `<option value="${safe}"${v === keep ? " selected" : ""}>${safe}</option>`;
    }
    el.innerHTML = html;
    el.value = keep;
    el.disabled = values.length === 0;
  }

  function buildOption(data) {
    const tc = getThemeColors();
    const font = "Outfit, sans-serif";
    if (data.empty) {
      return {
        backgroundColor: tc.paper,
        title: {
          text: "No data for current selection",
          left: "center",
          top: "middle",
          textStyle: { color: tc.text, fontFamily: font, fontSize: 16, fontWeight: 400 },
        },
      };
    }
    return {
      backgroundColor: tc.paper,
      textStyle: { color: tc.text, fontFamily: font },
      title: {
        text: "Buy Price Trends",
        subtext: data.subtitle,
        left: 0,
        textStyle: { color: tc.text, fontFamily: font, fontWeight: 600 },
        subtextStyle: { color: tc.text, fontFamily: font, opacity: 0.6 },
      },
      grid: { left: 64, right: 24, top: 96, bottom: 80 },
      tooltip: {
        trigger: "axis",
        axisPointer: { type: "line", lineStyle: { color: "#888", type: "dashed", width: 1 } },
        backgroundColor: tc.ttBg,
        borderColor: tc.ttBd,
        textStyle: { color: tc.text, fontFamily: font },
        valueFormatter: (v) => (v == null ? "—" : Number(v).toLocaleString(undefined, { maximumFractionDigits: 0 })),
      },
      legend: {
        data: ["Max. price", "Mean price", "Min. price"],
        right: 0, top: 0,
        textStyle: { color: tc.text, fontFamily: font },
        icon: "roundRect",
      },
      xAxis: {
        type: "category",
        data: data.x,
        name: "Year",
        nameLocation: "middle",
        nameGap: 50,
        nameTextStyle: { color: tc.text, fontFamily: font },
        axisLabel: {
          color: tc.text, fontFamily: font, rotate: 0,
          formatter: (val) => val.endsWith("S1") ? val.split(" - ")[0] : "",
        },
        axisLine: { lineStyle: { color: tc.axis } },
      },
      yAxis: {
        type: "value",
        name: "Price (€/m²)",
        nameTextStyle: { color: tc.text, fontFamily: font },
        axisLabel: { color: tc.text, fontFamily: font },
        axisLine: { lineStyle: { color: tc.axis } },
        splitLine: { lineStyle: { color: tc.grid } },
      },
      series: [
        { name: "Max. price",  type: "line", showSymbol: false, lineStyle: { color: COLOR_MAX,  width: 2 }, itemStyle: { color: COLOR_MAX  }, data: data.max },
        { name: "Mean price", type: "line", showSymbol: false, lineStyle: { color: COLOR_MEAN, width: 2, type: "dashed" }, itemStyle: { color: COLOR_MEAN }, data: data.mean },
        { name: "Min. price", type: "line", showSymbol: false, lineStyle: { color: COLOR_MIN,  width: 2 }, itemStyle: { color: COLOR_MIN  }, data: data.min },
      ],
    };
  }

  const YEAR_MARKS = [
    { x: "2014 - S1", label: "OMI methodological change (2014)", side: "right" },
    { x: "2024 - S1", label: "OMI methodological change (2024)", side: "left" },
  ];

  function drawYearMarkers(xData) {
    chartEl.querySelectorAll(".omi-marker").forEach(el => el.remove());
    if (!xData || !xData.length) return;
    chartEl.style.position = "relative";
    const tc = getThemeColors();
    const h = chartEl.clientHeight;
    const gridTop = 96, gridBottom = h - 80;
    for (const { x, label, side } of YEAR_MARKS) {
      const idx = xData.indexOf(x);
      if (idx < 0) continue;
      const px = chart.convertToPixel({ xAxisIndex: 0 }, idx);

      const wrap = document.createElement("div");
      wrap.className = "omi-marker";
      wrap.style.cssText = `position:absolute;left:${px - 5}px;top:${gridTop}px;width:11px;height:${gridBottom - gridTop}px;z-index:100;cursor:default;`;

      const line = document.createElement("div");
      line.style.cssText = `position:absolute;left:5px;top:0;width:0;height:100%;border-left:1.5px dashed rgba(255,190,60,0.72);pointer-events:none;`;

      const tip = document.createElement("div");
      const tipSide = side === "left" ? "right:12px;" : "left:12px;";
      tip.style.cssText = `display:none;position:absolute;top:4px;${tipSide}padding:5px 9px;font-size:11px;font-family:Outfit,sans-serif;white-space:nowrap;border-radius:3px;border:1px solid rgba(255,190,60,0.55);pointer-events:none;background:${tc.ttBg};color:${tc.text};`;
      tip.textContent = label;

      wrap.addEventListener("mouseenter", () => { tip.style.display = "block"; });
      wrap.addEventListener("mouseleave", () => { tip.style.display = "none"; });
      wrap.appendChild(line);
      wrap.appendChild(tip);
      chartEl.appendChild(wrap);
    }
  }

  // Sequence number prevents an older in-flight response from overwriting a newer one.
  let seq = 0;
  let lastChartData = null;
  let currentPeriod = "max";

  function sliceData(chartData) {
    if (currentPeriod === "max" || !chartData || chartData.empty) return chartData;
    const keep = currentPeriod === "5y" ? 10 : 20;
    const s = Math.max(0, chartData.x.length - keep);
    return {
      ...chartData,
      x:    chartData.x.slice(s),
      min:  chartData.min.slice(s),
      mean: chartData.mean.slice(s),
      max:  chartData.max.slice(s),
    };
  }

  chart.on("finished", () => {
    if (lastChartData && !lastChartData.empty) drawYearMarkers(sliceData(lastChartData).x);
  });

  // Re-render chart colours when theme toggles (no API re-fetch needed).
  new MutationObserver(function () {
    if (lastChartData) chart.setOption(buildOption(sliceData(lastChartData)), true);
  }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

  async function updateState() {
    const my = ++seq;
    const filters = readFilters();
    const qs = new URLSearchParams(filters).toString();
    let res;
    try {
      res = await fetch(`/api/state?${qs}`);
    } catch (err) {
      console.error("state fetch failed", err);
      return;
    }
    if (my !== seq) return;
    if (!res.ok) {
      console.error("state fetch failed", res.status);
      return;
    }
    const data = await res.json();
    if (my !== seq) return;

    paintSelect("province",     data.options.provinces,      filters.province);
    paintSelect("municipality", data.options.municipalities, filters.municipality);
    paintSelect("zone",         data.options.zones,          filters.zone);
    paintSelect("condition",    data.options.conditions,     filters.condition);

    lastChartData = data.chart;
    chart.setOption(buildOption(sliceData(data.chart)), true);
  }

  document.getElementById("chart-page").addEventListener("change", (e) => {
    const t = e.target;
    if (t && t.tagName === "SELECT" && t.name) {
      clearDownstream(t.name);
      updateState();
    }
  });

  document.getElementById("filter-form").addEventListener("click", (e) => {
    const btn = e.target.closest(".period-btn");
    if (!btn) return;
    document.querySelectorAll(".period-btn").forEach(b => b.classList.remove("period-btn--active"));
    btn.classList.add("period-btn--active");
    currentPeriod = btn.dataset.period;
    if (lastChartData) chart.setOption(buildOption(sliceData(lastChartData)), true);
  });

  window.addEventListener("resize", () => chart.resize());

  updateState();
})();
</script>
{% endblock %}
