<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Estate Insights{% endblock %}</title>
  <link rel="stylesheet" href="/assets/style.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
</head>
<body>
  <div id="app-shell">
    <aside id="sidebar">
      <div id="sidebar-logo">
        {% if logo_exists %}
          <img src="/assets/logo.svg" style="height: 48px;" alt="Estate Insights logo">
        {% else %}
          <div style="font-weight:700;font-size:1.25rem;color:#fff;letter-spacing:0.03em;">Estate Insights</div>
        {% endif %}
      </div>
      <div id="sidebar-title">Estate Insights</div>
      <hr>
      <nav class="nav">
        <a class="nav-link {% if active == 'chart' %}active{% endif %}" href="/">Chart</a>
        <a class="nav-link {% if active == 'info' %}active{% endif %}" href="/info">Info</a>
      </nav>
    </aside>
    <main id="page-content">
      {% block content %}{% endblock %}
    </main>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
