<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Estate Insights{% endblock %}</title>
  <link rel="stylesheet" href="/assets/style.css?v=4">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header id="topnav">
    <div id="topnav-left">
      <a id="topnav-brand" href="/">
        {% if logo_exists %}
          <img src="/assets/logo.svg" style="height: 28px;" alt="">
        {% endif %}
        <span id="topnav-title">Estate Insights</span>
      </a>
      <div id="topnav-sep"></div>
      <nav class="nav">
        <a class="nav-link {% if active == 'home' %}active{% endif %}" href="/home">Home</a>
        <a class="nav-link {% if active == 'chart' %}active{% endif %}" href="/chart">Chart</a>
        <a class="nav-link {% if active == 'map' %}active{% endif %}" href="/map">Map</a>
        <a class="nav-link {% if active == 'info' %}active{% endif %}" href="/info">Info</a>
      </nav>
    </div>
  </header>
  <main id="page-content">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
